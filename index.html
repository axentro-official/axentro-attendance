<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Axentro System | إدارة الحضور والانصراف</title>
    
    <!-- استخدام RemixIcon لضمان ظهور الأيقونات دائماً وبسرعة -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --glass: rgba(255,255,255,0.1);
            --text-main: #f1f5f9; --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(145deg, #020617 0%, #0f172a 100%); color: var(--text-main); direction: rtl; min-height: 100vh; overflow-x: hidden; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .app-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Cards & Inputs */
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); animation: fadeIn 0.5s ease; }
        input { width: 100%; padding: 16px; border-radius: 16px; background: rgba(0,0,0,0.3); border: 1px solid #334155; color: white; font-size: 16px; margin-bottom: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        
        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.2s; color: white; margin-bottom: 12px; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .btn-success { background: linear-gradient(135deg, var(--success), #059669); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .btn-secondary { background: #334155; }
        
        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 6, 23, 0.98); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        
        /* Camera Overlay */
        .camera-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .camera-overlay.active { display: flex; }
        .video-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; border-radius: 20px; overflow: hidden; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .cam-status { margin-top: 20px; color: var(--primary); font-weight: bold; font-size: 18px; text-align: center; min-height: 27px; }
        .close-cam { position: absolute; top: 20px; right: 20px; background: rgba(239, 68, 68, 0.9); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; z-index: 10; cursor: pointer; }
        
        /* Dashboard Elements */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .stat-box { text-align: center; padding: 20px; background: rgba(59, 130, 246, 0.1); border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.2); margin-bottom: 20px; }
        .stat-number { font-size: 48px; font-weight: 800; color: white; }
        .emp-list { max-height: 400px; overflow-y: auto; }
        .emp-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; }
        
        /* Toast Notification */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; z-index: 3000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; border: 1px solid var(--glass); display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { background: var(--danger); border-color: var(--danger); }
        .toast.success { background: var(--success); border-color: var(--success); }

        /* Footer */
        .footer { margin-top: auto; text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }
        .footer i { font-size: 24px; color: var(--primary); margin-bottom: 5px; display: block; animation: pulse 2s infinite; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="overlay">
    <div class="card" style="width: 100%;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="ri-fingerprint-fill" style="font-size: 50px; color: var(--primary);"></i>
            <h2 style="margin-top: 10px;">Axentro System</h2>
            <p style="color: var(--text-muted); font-size: 14px;">نظام الحضور الذكي</p>
        </div>
        <input type="text" id="loginCode" placeholder="اسم المستخدم أو الكود">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button class="btn btn-primary" onclick="handleLogin()">
            <i class="ri-login-circle-line"></i> تسجيل الدخول
        </button>
        <button class="btn btn-secondary" onclick="showRegister()">
            <i class="ri-user-add-line"></i> حساب جديد
        </button>
        <div class="footer">
            <i class="ri-qr-code-line"></i>
            Axentro © 2024
        </div>
    </div>
</div>

<!-- Register Screen -->
<div id="registerScreen" class="overlay hidden">
    <div class="card" style="width: 100%;">
        <h3 style="text-align: center; margin-bottom: 20px;">تسجيل موظف جديد</h3>
        <input type="text" id="regName" placeholder="الاسم الثلاثي">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <button class="btn btn-success" onclick="startRegistration()">
            <i class="ri-camera-line"></i> بدء التسجيل
        </button>
        <button class="btn btn-secondary" onclick="showLogin()">رجوع</button>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="app-container hidden">
    <div class="header">
        <h2 id="appTitle">لوحة التحكم</h2>
        <button class="btn btn-danger" style="width: auto; padding: 8px 16px; margin:0;" onclick="logout()">
            <i class="ri-logout-box-r-line"></i>
        </button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden">
        <div class="stat-box">
            <div class="stat-number" id="empCount">0</div>
            <p>إجمالي الموظفين</p>
        </div>
        <div class="card">
            <input type="text" id="searchInput" placeholder="بحث عن موظف..." oninput="filterEmployees(this.value)">
            <div id="employeeList" class="emp-list"></div>
        </div>
    </div>

    <!-- Employee Panel -->
    <div id="employeePanel" class="hidden">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <img id="userAvatar" src="" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover;">
                <div>
                    <h3 id="userNameDisplay">المستخدم</h3>
                    <p style="color: var(--text-muted); font-size: 13px;" id="userCodeDisplay">000</p>
                </div>
            </div>
            <div class="action-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn btn-success" onclick="handleAttendance('حضور')">
                    <i class="ri-arrow-right-up-line"></i> حضور
                </button>
                <button class="btn btn-danger" onclick="handleAttendance('انصراف')">
                    <i class="ri-arrow-right-down-line"></i> انصراف
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Camera Overlay -->
<div id="cameraOverlay" class="camera-overlay">
    <button class="close-cam" onclick="closeCamera()"><i class="ri-close-line"></i></button>
    <div class="video-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="cam-status" id="camStatus">جاري التجهيز...</div>
</div>

<!-- Toast -->
<div id="toast" class="toast"><i class="ri-alert-line"></i> <span id="toastMsg">رسالة</span></div>

<script>
    // ================= CONFIGURATION =================
    const SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // ضع رابط الـ Web App الخاص بك هنا
    const MATCH_THRESHOLD = 0.55; // حساسية المطابقة (كلما قل الرقم زادت الصرامة)
    
    // ================= STATE MANAGEMENT =================
    let currentUser = null;
    let sessionDescriptor = null; // بصمة الوجه المخزنة مؤقتاً في الذاكرة
    let cameraMode = ''; // 'REGISTER', 'VERIFY', 'UPDATE'
    let isProcessing = false;
    let videoStream = null;
    let faceMatcher = null;
    let modelsLoaded = false;

    // ================= INITIALIZATION =================
    window.addEventListener('DOMContentLoaded', async () => {
        await loadFaceModels();
        checkSession();
    });

    async function loadFaceModels() {
        const statusEl = document.getElementById('camStatus');
        if(statusEl) statusEl.innerText = "جاري تحميل الذكاء الاصطناعي...";
        
        try {
            const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            modelsLoaded = true;
            console.log("AI Models Loaded Successfully");
        } catch (err) {
            console.error("Failed to load models:", err);
            showToast("فشل تحميل مكتبة الوجه. تأكد من الاتصال بالإنترنت.", "error");
        }
    }

    // ================= AUTHENTICATION LOGIC =================
    async function handleLogin() {
        const code = document.getElementById('loginCode').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        if (!code || !pass) return showToast("يرجى إدخال البيانات كاملة", "error");

        showToast("جاري التحقق...", "");
        
        try {
            const response = await fetch(`${SCRIPT_URL}?action=verifyLogin&code=${encodeURIComponent(code)}&password=${encodeURIComponent(pass)}`);
            const data = await response.json();

            if (data.success) {
                currentUser = data;
                
                // التحقق من وجود بصمة وجه
                await checkFaceData(data.code);

                if (!sessionDescriptor) {
                    // الحالة الأولى: لا توجد بصمة مسجلة
                    showToast("لا توجد بصمة وجه مسجلة. يرجى التسجيل الآن.", "warning");
                    cameraMode = 'UPDATE'; // وضع تحديث/تسجيل البصمة
                    openCamera();
                } else {
                    // الحالة الثانية: البصمة موجودة، دخول ناجح
                    enterApp();
                }
            } else {
                showToast(data.error || "بيانات الدخول غير صحيحة", "error");
            }
        } catch (err) {
            showToast("خطأ في الاتصال بالخادم", "error");
            console.error(err);
        }
    }

    async function checkFaceData(code) {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getEmployeeData&code=${encodeURIComponent(code)}`);
            const data = await res.json();
            if (data.success && data.descriptor && data.descriptor.length > 0) {
                sessionDescriptor = data.descriptor;
                // تحميل صورة المستخدم للعرض
                if(data.userImage) document.getElementById('userAvatar').src = data.userImage;
            } else {
                sessionDescriptor = null;
            }
        } catch (e) { console.error(e); }
    }

    function enterApp() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        document.getElementById('userNameDisplay').innerText = currentUser.name;
        document.getElementById('userCodeDisplay').innerText = currentUser.code;

        if (currentUser.isAdmin === true || currentUser.isAdmin === "true") {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('employeePanel').classList.add('hidden');
            document.getElementById('appTitle').innerText = "لوحة المدير";
            loadEmployees();
        } else {
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('employeePanel').classList.remove('hidden');
            document.getElementById('appTitle').innerText = "بوابة الموظف";
        }
    }

    // ================= CAMERA & FACE RECOGNITION =================
    async function openCamera() {
        if (!modelsLoaded) return showToast("النظام لا يزال يحمل الملفات، انتظر لحظة", "error");
        
        document.getElementById('cameraOverlay').classList.add('active');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('camStatus');

        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                audio: false 
            });
            video.srcObject = videoStream;
            
            await new Promise(resolve => video.onloadedmetadata = resolve);
            video.play();
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            isProcessing = false;
            detectFacesLoop();
            
        } catch (err) {
            showToast("تعذر الوصول للكاميرا. تأكد من الصلاحيات.", "error");
            closeCamera();
        }
    }

    function closeCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
        }
        document.getElementById('cameraOverlay').classList.remove('active');
        isProcessing = false;
    }

    async function detectFacesLoop() {
        if (!document.getElementById('cameraOverlay').classList.contains('active')) return;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('camStatus');

        // الكشف السريع عن الوجه
        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks(true);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
            // رسم الإطار
            const box = detection.detection.box;
            const drawBox = new faceapi.draw.DrawBox(box, { label: 'Face Detected' });
            drawBox.draw(canvas);

            // منطق Liveness Detection بسيط (حركة الرأس)
            // هنا نفترض أن ثبات الوجه لمدة قصيرة يكفي للنسخ، أو نطلب حركة بسيطة
            // للتبسيط والسرعة في هذا الكود: سننتظر استقرار الوجه
            
            status.innerHTML = '<i class="ri-check-double-line"></i> ثبت وجهك...';
            status.style.color = '#10b981';

            if (!isProcessing) {
                isProcessing = true;
                // تأخير بسيط لضمان الاستقرار
                setTimeout(() => processCapture(detection), 1000);
            }
        } else {
            status.innerHTML = '<i class="ri-search-line"></i> ابحث عن وجهك...';
            status.style.color = '#f59e0b';
            isProcessing = false;
        }

        requestAnimationFrame(detectFacesLoop);
    }

    async function processCapture(detection) {
        const fullFaceDescriptor = await faceapi.computeFaceDescriptor(detection);
        const descriptorArray = Array.from(fullFaceDescriptor);

        if (cameraMode === 'UPDATE') {
            // تسجيل بصمة جديدة لأول مرة
            document.getElementById('camStatus').innerText = "جاري حفظ البصمة...";
            
            // التقاط صورة مصغرة للحفظ
            const canvasImg = document.createElement('canvas');
            canvasImg.width = 150; canvasImg.height = 150;
            const ctx = canvasImg.getContext('2d');
            ctx.drawImage(document.getElementById('video'), 0, 0, 150, 150);
            const imageData = canvasImg.toDataURL('image/jpeg', 0.7);

            const payload = {
                action: 'updateFace',
                code: currentUser.code,
                descriptor: descriptorArray,
                imageData: imageData
            };

            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();

            if (result.success) {
                showToast("تم تسجيل بصمة الوجه بنجاح!", "success");
                sessionDescriptor = descriptorArray; // تحديث الذاكرة
                setTimeout(() => {
                    closeCamera();
                    if(!document.getElementById('mainApp').classList.contains('hidden')) {
                        // نحن بالفعل داخل التطبيق
                    } else {
                        enterApp(); // إذا كان التسجيل أثناء الدخول
                    }
                }, 1500);
            } else {
                showToast("فشل حفظ البصمة: " + result.error, "error");
                isProcessing = false;
            }
        } 
        else if (cameraMode === 'VERIFY') {
            // مطابقة البصمة للحضور/الانصراف
            if (!sessionDescriptor) {
                showToast("خطأ: لا توجد بيانات للمقارنة", "error");
                closeCamera();
                return;
            }

            const distance = faceapi.euclideanDistance(sessionDescriptor, descriptorArray);
            document.getElementById('camStatus').innerText = `جاري المطابقة... (${distance.toFixed(2)})`;

            if (distance < MATCH_THRESHOLD) {
                document.getElementById('camStatus').innerHTML = '<i class="ri-checkbox-circle-line"></i> تمت المطابقة!';
                playSound('success');
                setTimeout(() => {
                    closeCamera();
                    submitAttendanceToServer(); // دالة مخصصة لإرسال الحضور بعد النجاح
                }, 1000);
            } else {
                document.getElementById('camStatus').innerHTML = '<i class="ri-close-circle-line"></i> الوجه غير مطابق!';
                playSound('error');
                showToast("فشل التحقق من الهوية", "error");
                isProcessing = false; // السماح بالمحاولة مرة أخرى
            }
        }
    }

    // ================= ATTENDANCE LOGIC =================
    let pendingAttendanceType = '';

    async function handleAttendance(type) {
        if (!sessionDescriptor) {
            showToast("يجب تسجيل بصمة الوجه أولاً", "error");
            cameraMode = 'UPDATE';
            openCamera();
            return;
        }

        pendingAttendanceType = type;
        cameraMode = 'VERIFY';
        openCamera();
    }

    async function submitAttendanceToServer() {
        showToast("جاري تسجيل العملية...", "");
        try {
            const now = new Date();
            const payload = {
                action: 'attendance',
                code: currentUser.code,
                type: pendingAttendanceType,
                datetime: now.toLocaleString(),
                location: 'Manual Entry' // يمكن إضافة GPS هنا
            };

            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();

            if (data.success) {
                showToast(`تم تسجيل ${pendingAttendanceType} بنجاح`, "success");
                playSound('success');
            } else {
                showToast(data.error, "error");
            }
        } catch (e) {
            showToast("خطأ في الشبكة", "error");
        }
    }

    // ================= ADMIN FUNCTIONS =================
    async function loadEmployees() {
        const list = document.getElementById('employeeList');
        list.innerHTML = '<div style="text-align:center; padding:20px;"><i class="ri-loader-4-line ri-spin"></i></div>';
        
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getEmployees`);
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('empCount').innerText = data.employees.length;
                renderEmployeeList(data.employees);
            }
        } catch (e) {
            list.innerHTML = '<p style="text-align:center; color:red;">فشل تحميل البيانات</p>';
        }
    }

    function renderEmployeeList(employees) {
        const list = document.getElementById('employeeList');
        list.innerHTML = '';
        employees.forEach(emp => {
            const div = document.createElement('div');
            div.className = 'emp-item';
            div.innerHTML = `
                <div>
                    <strong>${emp.name}</strong><br>
                    <small style="color:var(--text-muted)">${emp.code}</small>
                </div>
                <div>
                    <button class="btn btn-success" style="width:auto; padding:5px 10px; font-size:12px; margin:0;" onclick="adminMarkAttendance('${emp.code}', '${emp.name}', 'حضور')">حضور</button>
                    <button class="btn btn-danger" style="width:auto; padding:5px 10px; font-size:12px; margin:0;" onclick="adminMarkAttendance('${emp.code}', '${emp.name}', 'انصراف')">انصراف</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function filterEmployees(query) {
        // تصفية بسيطة في الواجهة الأمامية
        const items = document.querySelectorAll('.emp-item');
        items.forEach(item => {
            const text = item.innerText.toLowerCase();
            item.style.display = text.includes(query.toLowerCase()) ? 'flex' : 'none';
        });
    }

    async function adminMarkAttendance(code, name, type) {
        // المدير يقوم بالتسجيل مباشرة دون تحقق من الوجه (أو يمكن إضافته إذا أردت)
        // هنا سنفترض أن المدير موثوق، لكن يمكنك طلب Face Verify للمدير قبل هذا الإجراء
        showToast(`جاري تسجيل ${type} لـ ${name}...`, "");
        
        const payload = {
            action: 'attendance',
            code: code,
            type: type,
            datetime: new Date().toLocaleString(),
            location: 'Admin Override'
        };

        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        
        if(data.success) showToast("تم التسجيل بنجاح", "success");
        else showToast(data.error, "error");
    }

    // ================= UTILITIES =================
    function showRegister() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('registerScreen').classList.remove('hidden');
    }

    function showLogin() {
        document.getElementById('registerScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
    }

    async function startRegistration() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        
        if(!name || !email) return showToast("أكمل البيانات", "error");

        // هنا نقوم بإنشاء مستخدم جديد أولاً ثم نفتح الكاميرا
        // ملاحظة: يفضل إنشاء المستخدم في Google Sheet أولاً ثم جلب الـ Code
        // للتبسيط، سنفترض أن الكود يتم توليده تلقائياً أو نرسل الاسم والإيميل لإنشاء الحساب
        
        showToast("جاري إنشاء الحساب...", "");
        const payload = { action: 'register', name: name, email: email };
        
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            
            if(data.success) {
                showToast("تم إنشاء الحساب! قم بتسجيل الوجه الآن.", "success");
                // تعيين بيانات مؤقتة للدخول في وضع التسجيل
                currentUser = { code: data.code, name: name }; // افترضنا أن الـ backend يرجع الكود
                cameraMode = 'UPDATE';
                openCamera();
            } else {
                showToast(data.error, "error");
            }
        } catch(e) {
            showToast("خطأ في الاتصال", "error");
        }
    }

    function logout() {
        currentUser = null;
        sessionDescriptor = null;
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginCode').value = '';
        document.getElementById('loginPass').value = '';
    }

    function showToast(msg, type = "") {
        const toast = document.getElementById('toast');
        const txt = document.getElementById('toastMsg');
        txt.innerText = msg;
        toast.className = `toast show ${type}`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function playSound(type) {
        // يمكن إضافة ملفات صوتية هنا لاحقاً
        // حالياً نعتمد على الاهتزاز
        if (navigator.vibrate) {
            if (type === 'error') navigator.vibrate([100, 50, 100]);
            else navigator.vibrate(50);
        }
    }

</script>
