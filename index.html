<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axentro | الحضور بالوجه</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            text-align: center;
            direction: rtl;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            margin: auto;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #fff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .camera-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            display: none; /* إخفاء بطاقة الكاميرا حتى يتم تشغيلها */
        }
        .camera-card.active {
            display: block;
        }
        .camera-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            aspect-ratio: 4 / 3;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(59,130,246,0.5);
            border-radius: 24px;
            pointer-events: none;
            animation: borderPulse 2s infinite;
        }
        @keyframes borderPulse {
            0% { border-color: rgba(59,130,246,0.3); box-shadow: inset 0 0 10px rgba(59,130,246,0.2); }
            50% { border-color: rgba(59,130,246,0.8); box-shadow: inset 0 0 25px rgba(59,130,246,0.5); }
            100% { border-color: rgba(59,130,246,0.3); box-shadow: inset 0 0 10px rgba(59,130,246,0.2); }
        }
        .status-card, .location-card {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 12px 20px;
            margin-top: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(5px);
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .admin-card, .action-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 16px;
            color: white;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active {
            transform: scale(0.97);
        }
        .btn-register {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .btn-attendance {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            flex: 1;
        }
        .btn-leave {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            flex: 1;
        }
        .action-card {
            display: flex;
            gap: 16px;
        }
        .register-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 12px;
        }
        .name-badge {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: inline-block;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 18px;
            margin-top: 20px;
        }
        footer {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 24px 16px;
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .qr-image {
            width: 70px;
            height: auto;
            border-radius: 12px;
            background: white;
            padding: 6px;
            margin-top: 10px;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            max-width: 80%;
            text-align: center;
            direction: rtl;
        }
        .toast-message.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast-message.success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-message.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-message.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    </style>
</head>
<body>
<div class="container">
    <h1>نظام الحضور والانصراف</h1>
    <p class="subtitle">Axentro Attendance System</p>

    <div class="camera-card" id="cameraCard">
        <div class="camera-wrapper">
            <video id="video" autoplay muted playsinline></video>
            <div class="camera-overlay"></div>
        </div>
        <div class="status-card" id="status">
            <div class="spinner"></div>
            <span>جاري تحميل النماذج...</span>
        </div>
        <div class="location-card" id="location">
            <span>📍 جاري الحصول على الموقع...</span>
        </div>
    </div>

    <div class="admin-card">
        <h3>📝 تسجيل موظف جديد</h3>
        <div class="input-group">
            <input type="text" id="empName" placeholder="اسم الموظف" autocomplete="off">
            <button id="registerBtn" class="btn-register">📸 التقاط الوجه وتسجيل</button>
        </div>
        <div class="register-hint">أدخل الاسم ثم اضغط الزر، وسيتم فتح الكاميرا تلقائياً</div>
    </div>

    <div class="action-card">
        <button id="attendanceBtn" class="btn-attendance">✅ تسجيل حضور</button>
        <button id="leaveBtn" class="btn-leave">🚪 تسجيل انصراف</button>
    </div>

    <div id="recognizedName" style="display: none;">
        <div class="name-badge">
            <span>مرحباً</span>
            <strong id="recognizedUserName">---</strong>
        </div>
    </div>
</div>

<footer>
    <p>© 2024 Axentro - All Rights Reserved</p>
    <p>Powered by Axentro System</p>
    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
        <img src="qr-links.png" alt="QR Code" class="qr-image">
    </a>
    <p>Scan Me</p>
</footer>

<script>
    // ------------------- عناصر DOM -------------------
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    const locationDiv = document.getElementById('location');
    const empNameInput = document.getElementById('empName');
    const registerBtn = document.getElementById('registerBtn');
    const attendanceBtn = document.getElementById('attendanceBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const recognizedDiv = document.getElementById('recognizedName');
    const recognizedSpan = document.getElementById('recognizedUserName');
    const cameraCard = document.getElementById('cameraCard');

    // ------------------- متغيرات -------------------
    let modelsLoaded = false;
    let stream = null;
    let labeledDescriptors = [];
    let currentLocation = null;
    let currentName = null;
    let recognitionInterval = null;
    let cameraActive = false;

    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnJeFvBSZuH7E_NN3-8Mv5K694rCv_jrGTbT_sl5Tl0UnRmzuKZx8przHd1IuvgiQBMA/exec';

    // ------------------- دوال مساعدة -------------------
    function showToast(message, type = 'info') {
        let toast = document.getElementById('customToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.add('show', type);
        setTimeout(() => toast.classList.remove('show', type), 3000);
    }

    function updateStatus(text, isLoading = false) {
        statusDiv.innerHTML = isLoading ? `<div class="spinner"></div><span>${text}</span>` : `<span>${text}</span>`;
    }

    // ------------------- تشغيل الكاميرا -------------------
    async function startCamera() {
        if (cameraActive) return;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            cameraActive = true;
            cameraCard.classList.add('active');
            updateStatus('الكاميرا تعمل. جاري تحميل النماذج...', true);
            await loadModels(); // تأكد من تحميل النماذج بعد تشغيل الكاميرا
            startRecognition();
        } catch (err) {
            updateStatus('فشل تشغيل الكاميرا: ' + err.message, false);
            showToast('تعذر الوصول إلى الكاميرا', 'error');
        }
    }

    // ------------------- تحميل النماذج -------------------
    async function loadModels() {
        if (modelsLoaded) return;
        try {
            await faceapi.nets.ssdMobilenetv1.loadFromUri('/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
            modelsLoaded = true;
            updateStatus('النماذج جاهزة. جاري التعرف...', false);
        } catch (err) {
            updateStatus('فشل تحميل النماذج: ' + err.message, false);
            showToast('فشل تحميل نماذج الوجه', 'error');
        }
    }

    // ------------------- تحميل الموظفين المخزنين -------------------
    function loadEmployees() {
        const stored = localStorage.getItem('axentro_face_descriptors');
        if (stored) {
            const data = JSON.parse(stored);
            labeledDescriptors = data.map(item => new faceapi.LabeledFaceDescriptors(
                item.label,
                item.descriptors.map(d => new Float32Array(d))
            ));
            updateStatus(`تم تحميل ${labeledDescriptors.length} موظف`, false);
        } else {
            updateStatus('لا يوجد موظفون مسجلون. سجل موظفاً أولاً', false);
        }
    }

    function saveEmployees() {
        const data = labeledDescriptors.map(ld => ({
            label: ld.label,
            descriptors: ld.descriptors.map(d => Array.from(d))
        }));
        localStorage.setItem('axentro_face_descriptors', JSON.stringify(data));
        updateStatus(`تم حفظ ${labeledDescriptors.length} موظف`, false);
    }

    // ------------------- التعرف المستمر -------------------
    async function startRecognition() {
        if (recognitionInterval) clearInterval(recognitionInterval);
        const displaySize = { width: video.videoWidth, height: video.videoHeight };
        faceapi.matchDimensions(video, displaySize);
        recognitionInterval = setInterval(async () => {
            if (!modelsLoaded || video.videoWidth === 0 || !cameraActive) return;
            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(detections, displaySize);
            if (resized.length > 0 && labeledDescriptors.length > 0) {
                const matcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                const best = matcher.findBestMatch(resized[0].descriptor);
                if (best.label !== 'unknown') {
                    currentName = best.label;
                    recognizedSpan.textContent = currentName;
                    recognizedDiv.style.display = 'block';
                    updateStatus(`مرحباً ${currentName}`, false);
                } else {
                    currentName = null;
                    recognizedDiv.style.display = 'none';
                    updateStatus('وجه غير مسجل', false);
                }
            } else if (resized.length === 0) {
                currentName = null;
                recognizedDiv.style.display = 'none';
                updateStatus('لم يتم اكتشاف وجه', false);
            }
        }, 1500);
    }

    // ------------------- الموقع -------------------
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    currentLocation = `https://maps.google.com/?q=${lat},${lng}`;
                    locationDiv.innerHTML = `<span>📍 <a href="${currentLocation}" target="_blank" style="color:#60a5fa;">الموقع الحالي</a></span>`;
                },
                err => {
                    locationDiv.innerHTML = `<span>⚠️ فشل الحصول على الموقع: ${err.message}</span>`;
                    currentLocation = 'غير متوفر';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            locationDiv.innerHTML = `<span>⚠️ المتصفح لا يدعم تحديد الموقع</span>`;
            currentLocation = 'غير مدعوم';
        }
    }
    getLocation();
    setInterval(getLocation, 30000);

    // ------------------- التقاط صورة -------------------
    function captureImage() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg');
    }

    // ------------------- إرسال البيانات -------------------
    async function sendAttendance(name, type) {
        if (!name) {
            showToast('لم يتم التعرف على الوجه', 'warning');
            return;
        }
        if (!currentLocation) {
            showToast('جاري الحصول على الموقع... حاول مرة أخرى', 'info');
            setTimeout(() => sendAttendance(name, type), 1000);
            return;
        }
        const imgData = captureImage();
        const now = new Date();
        const timeStr = now.toLocaleString('ar-EG');
        const payload = { name, type, location: currentLocation, time: timeStr, imageData: imgData };

        updateStatus('جاري الإرسال...', true);
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            updateStatus(`تم تسجيل ${type}`, false);
            showToast(`✅ تم تسجيل ${type}`, 'success');
        } catch (err) {
            updateStatus('خطأ في الإرسال', false);
            showToast('حدث خطأ أثناء الإرسال', 'error');
        }
    }

    // ------------------- تسجيل موظف جديد -------------------
    async function registerEmployee() {
        const name = empNameInput.value.trim();
        if (!name) {
            showToast('يرجى إدخال اسم الموظف', 'warning');
            return;
        }
        // إذا لم تكن الكاميرا نشطة، افتحها
        if (!cameraActive) {
            await startCamera();
            // ننتظر قليلاً حتى تكتمل بدء الكاميرا وتحميل النماذج
            if (!modelsLoaded) {
                showToast('جاري تجهيز الكاميرا، حاول مرة أخرى بعد لحظة', 'info');
                return;
            }
        }
        updateStatus('جاري التقاط الوجه...', true);
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        if (!detection) {
            updateStatus('لم يتم اكتشاف وجه', false);
            showToast('لم يتم اكتشاف وجه، حاول مرة أخرى', 'error');
            return;
        }
        const descriptor = detection.descriptor;
        const existing = labeledDescriptors.find(ld => ld.label === name);
        if (existing) {
            existing.descriptors.push(descriptor);
            updateStatus(`تم تحديث ${name}`, false);
            showToast(`تم تحديث بيانات ${name}`, 'success');
        } else {
            labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(name, [descriptor]));
            updateStatus(`تم تسجيل ${name}`, false);
            showToast(`تم تسجيل ${name}`, 'success');
        }
        saveEmployees();
        empNameInput.value = '';
    }

    // ------------------- التعامل مع الحضور/الانصراف -------------------
    async function handleAttendance(type) {
        if (!cameraActive) {
            await startCamera();
            if (!modelsLoaded) {
                showToast('جاري تجهيز الكاميرا، حاول مرة أخرى بعد لحظة', 'info');
                return;
            }
        }
        // ننتظر قليلاً حتى يتم التعرف
        if (!currentName) {
            showToast('الرجاء التوجه نحو الكاميرا للتعرف على الوجه', 'warning');
            return;
        }
        sendAttendance(currentName, type);
    }

    // ------------------- ربط الأزرار -------------------
    registerBtn.onclick = registerEmployee;
    attendanceBtn.onclick = () => handleAttendance('حضور');
    leaveBtn.onclick = () => handleAttendance('انصراف');

    // ------------------- بدء التطبيق (بدون كاميرا) -------------------
    // نحمّل الموظفين فقط، والكاميرا ستُفتح عند الحاجة
    loadEmployees();
</script>
</body>
</html>
