<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Axentro | نظام متابعة الموظفين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6; --primary-dark: #2563eb;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0f172a 100%);
            color: #f1f5f9; direction: rtl; min-height: 100vh;
            display: flex; flex-direction: column; overflow-x: hidden;
        }
        
        /* Container takes available space */
        .app-container {
            flex: 1;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 28px; text-align: center;
            background: linear-gradient(135deg, #fff, #a5f3fc);
            -webkit-background-clip: text; color: transparent;
            margin-bottom: 24px;
        }

        /* --- Camera Fix (z-index added) --- */
        .camera-container {
            background: #000; border-radius: 24px; overflow: hidden;
            display: none; position: fixed; /* Changed to fixed for overlay */
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; aspect-ratio: 4/3;
            box-shadow: 0 20px 60px -10px rgba(0,0,0,0.9);
            z-index: 1001; /* Higher than overlay */
            border: 2px solid var(--primary);
        }
        .camera-container.active { display: block; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .face-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; }
        .capture-btn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; padding: 12px 32px; border-radius: 50px;
            font-size: 16px; font-weight: bold; cursor: pointer; z-index: 20;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Cards & Inputs --- */
        .card {
            background: var(--card-bg); backdrop-filter: blur(12px);
            border-radius: 24px; padding: 24px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 14px 20px; border-radius: 50px;
            background: rgba(0,0,0,0.5); border: 1px solid #334155;
            color: white; font-size: 16px; outline: none; margin-bottom: 12px;
            transition: 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        input::placeholder { color: #94a3b8; }
        
        /* --- Buttons --- */
        .btn {
            width: 100%; padding: 14px; border-radius: 50px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s; color: white;
        }
        .btn-login { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .btn-reg { background: linear-gradient(135deg, var(--warning), #d97706); }
        .btn-att { background: linear-gradient(135deg, var(--success), #059669); }
        .btn-leave { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .btn:active { transform: scale(0.98); }
        
        .action-group { display: flex; gap: 12px; margin-top: 20px; }
        .action-group .btn { flex: 1; }

        /* --- Status --- */
        .status-bar {
            background: rgba(15, 23, 42, 0.7); padding: 10px 20px;
            border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 14px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1);
        }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Overlays --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.98); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            padding: 20px;
        }
        .overlay.hidden { display: none; }
        
        /* --- Footer --- */
        footer {
            background: rgba(15, 23, 42, 0.8);
            padding: 30px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: auto; /* Pushes footer to bottom */
        }
        footer .brand {
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text; color: transparent;
            margin-bottom: 10px;
        }
        footer p { color: #64748b; font-size: 12px; margin-bottom: 5px; }
        footer .qr-code {
            width: 80px; height: 80px;
            background: white; padding: 5px; border-radius: 10px;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        footer .qr-code:hover { transform: scale(1.1); }

        /* --- Toast --- */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 14px; z-index: 3000; transition: 0.3s; opacity: 0;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        .logout-btn {
            position: fixed; top: 20px; left: 20px; z-index: 50;
            background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="overlay">
    <div class="card" style="max-width: 400px; width: 100%; margin-bottom: 20px;">
        <h1 style="margin-bottom: 10px;"><i class="fas fa-fingerprint"></i> Axentro</h1>
        <p style="color: #94a3b8; margin-bottom: 24px;">نظام متابعة الحضور والانصراف</p>
        
        <input type="text" id="loginCode" placeholder="كود المستخدم">
        <input type="password" id="loginPass" placeholder="كلمة السر">
        
        <button class="btn btn-login" onclick="handleLogin()" style="margin-bottom: 12px;">
            <i class="fas fa-arrow-left"></i> دخول
        </button>
        <button class="btn btn-reg" onclick="showRegisterScreen()">
            <i class="fas fa-user-plus"></i> تسجيل موظف جديد
        </button>
    </div>
</div>

<!-- Register Screen -->
<div id="registerScreen" class="overlay hidden">
    <div class="card" style="max-width: 400px; width: 100%;">
        <h3 style="margin-bottom: 20px;"><i class="fas fa-id-card"></i> تسجيل موظف جديد</h3>
        <input type="text" id="regName" placeholder="اسم الموظف الثلاثي">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني (لإرسال البيانات)">
        <button class="btn btn-reg" onclick="startRegistration()">
            <i class="fas fa-camera"></i> التقاط الوجه وتسجيل
        </button>
        <button class="btn" onclick="showLoginScreen()" style="background: #334155; margin-top: 10px;">رجوع</button>
    </div>
</div>

<!-- Main App -->
<div class="app-container" id="mainApp" style="display: none;">
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    
    <h1>نظام متابعة الموظفين</h1>
    
    <div class="status-bar" id="statusBar">
        <div class="spinner"></div> <span>جاري التحميل...</span>
    </div>
    <div class="status-bar" id="locBar" style="font-size: 12px;">
        <i class="fas fa-map-marker-alt"></i> <span>جاري تحديد الموقع...</span>
    </div>

    <!-- Camera Container (Now separate for better z-index control) -->
    <div class="camera-container" id="camContainer">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" class="face-canvas"></canvas>
        <button class="capture-btn" id="captureBtn" onclick="handleCapture()">
            <i class="fas fa-camera"></i> التقاط
        </button>
    </div>

    <div class="card" id="adminPanel" style="display: none;">
        <h3 style="margin-bottom: 12px;"><i class="fas fa-user-shield"></i> لوحة المدير</h3>
        <input type="text" id="searchInput" placeholder="ابحث باسم الموظف أو الكود..." style="margin-top: 10px;">
        <div id="searchResults" style="margin-top: 10px; text-align: right; font-size: 14px;"></div>
    </div>

    <div class="action-group" id="actionBtns">
        <button class="btn btn-att" onclick="handleAttendance('حضور')"><i class="fas fa-check"></i> حضور</button>
        <button class="btn btn-leave" onclick="handleAttendance('انصراف')"><i class="fas fa-times"></i> انصراف</button>
    </div>
</div>

<!-- Footer -->
<footer id="mainFooter">
    <div class="brand">Axentro</div>
    <p>نظام حضور وانصراف ومتابعة الموظفين</p>
    <p>© 2024 Axentro – All Rights Reserved</p>
    <p style="margin-top: 5px; font-size: 10px;">By Axentro Team</p>
    <img src="qr-links.png" alt="QR Code" class="qr-code">
</footer>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
    // --- Configuration ---
    const URL = 'https://script.google.com/macros/s/AKfycbxnJeFvBSZuH7E_NN3-8Mv5K694rCv_jrGTbT_sl5Tl0UnRmzuKZx8przHd1IuvgiQBMA/exec';
    
    // --- State ---
    let user = null;
    let models = false;
    let stream = null;
    let employees = [];
    let localData = []; 
    let selectedEmp = null;
    let regMode = false; 
    let regData = {}; 
    
    // --- Elements ---
    const $ = id => document.getElementById(id);
    const video = $('video'), canvas = $('canvas'), ctx = canvas.getContext('2d');
    
    // --- Utils ---
    const showToast = (msg, type = '') => {
        const t = $('toast'); t.textContent = msg; t.className = `toast show ${type}`;
        setTimeout(() => t.classList.remove('show'), 4000);
    };
    const setStatus = (txt, load = false) => {
        $('statusBar').innerHTML = load ? `<div class="spinner"></div><span>${txt}</span>` : `<span>${txt}</span>`;
    };

    // --- Initialization ---
    async function init() {
        // Load Face-API Models
        try {
            setStatus('تحميل نماذج الذكاء...', true);
            await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/');
            models = true;
            setStatus('النظام جاهز ✔');
        } catch (e) { setStatus('فشل تحميل النماذج'); console.error(e); return; }

        // Load Local Data
        const stored = localStorage.getItem('axentro_data');
        if(stored) localData = JSON.parse(stored);

        // Location
        getLocation();

        // Check Session
        const savedUser = sessionStorage.getItem('user');
        if (savedUser) {
            user = JSON.parse(savedUser);
            showApp();
        }
    }

    // --- Auth ---
    async function handleLogin() {
        const code = $('loginCode').value.trim();
        const pass = $('loginPass').value.trim();
        if (!code || !pass) return showToast('يرجى إدخال الكود وكلمة السر', 'error');
        
        setStatus('جاري التحقق...', true);
        try {
            const res = await fetch(`${URL}?action=verifyLogin&code=${encodeURIComponent(code)}&password=${encodeURIComponent(pass)}`);
            const data = await res.json();
            if (data.success) {
                user = { name: data.name, code: data.code, isAdmin: data.isAdmin };
                sessionStorage.setItem('user', JSON.stringify(user));
                showApp();
            } else {
                showToast(data.error || 'بيانات خاطئة', 'error');
            }
        } catch (e) { showToast('خطأ في الاتصال', 'error'); }
        setStatus('النظام جاهز ✔');
    }

    function logout() {
        sessionStorage.removeItem('user');
        user = null;
        $('mainApp').style.display = 'none';
        $('mainFooter').style.display = 'block';
        $('loginScreen').classList.remove('hidden');
        $('statusBar').innerHTML = '<span>النظام جاهز ✔</span>';
    }

    // --- App Logic ---
    async function showApp() {
        $('loginScreen').classList.add('hidden');
        $('registerScreen').classList.add('hidden');
        $('mainApp').style.display = 'block';
        $('mainFooter').style.display = 'block'; // Keep footer visible or hide if you want

        if (user.isAdmin) {
            $('adminPanel').style.display = 'block';
            $('statusBar').innerHTML = `<span>مرحباً المدير</span>`;
            const res = await fetch(`${URL}?action=getEmployees`);
            const d = await res.json();
            if(d.success) employees = d.employees;
        } else {
            $('adminPanel').style.display = 'none';
            selectedEmp = localData.find(e => e.code === user.code);
            if(!selectedEmp) selectedEmp = employees.find(e => e.code === user.code);
            if(selectedEmp) setStatus(`مرحباً ${user.name}`);
            
            // Check if first login (optional UI hint)
            showToast('مرحباً بك! يمكنك تسجيل حضورك الآن.', 'success');
        }
    }

    // --- Registration ---
    function showRegisterScreen() {
        $('loginScreen').classList.add('hidden');
        $('registerScreen').classList.remove('hidden');
    }
    function showLoginScreen() {
        $('registerScreen').classList.add('hidden');
        $('loginScreen').classList.remove('hidden');
    }

    async function startRegistration() {
        const name = $('regName').value.trim();
        const email = $('regEmail').value.trim();
        if (!name || !email) return showToast('يرجى إدخال الاسم والبريد', 'error');
        
        regData = { name, email };
        regMode = true;
        
        const opened = await openCamera();
        if (!opened) {
            regMode = false;
            showToast('فشل فتح الكاميرا', 'error');
        }
    }

    // --- Camera & Face Detection ---
    async function openCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            // Important: play inside a user interaction event flow or immediately
            await video.play(); 
            
            $('camContainer').classList.add('active');
            
            // Setup Canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Start Drawing Loop
            drawFaceBox();
            return true;
        } catch (e) {
            console.error(e);
            return false; 
        }
    }

    function closeCamera() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        video.srcObject = null;
        $('camContainer').classList.remove('active');
        regMode = false;
    }

    // Drawing Face Box
    async function drawFaceBox() {
        if (!video.srcObject) return;
        
        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks();
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (detection) {
            const box = detection.detection.box;
            
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            
            const cLen = 20;
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 4;
            
            ctx.beginPath(); ctx.moveTo(box.x, box.y+cLen); ctx.lineTo(box.x, box.y); ctx.lineTo(box.x+cLen, box.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(box.x+box.width-cLen, box.y); ctx.lineTo(box.x+box.width, box.y); ctx.lineTo(box.x+box.width, box.y+cLen); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(box.x, box.y+box.height-cLen); ctx.lineTo(box.x, box.y+box.height); ctx.lineTo(box.x+cLen, box.y+box.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(box.x+box.width-cLen, box.y+box.height); ctx.lineTo(box.x+box.width, box.y+box.height); ctx.lineTo(box.x+box.width, box.y+box.height-cLen); ctx.stroke();

            ctx.fillStyle = '#10b981';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('وجه مكتشف', box.x, box.y - 10);
        }
        
        requestAnimationFrame(drawFaceBox);
    }

    // --- Capture Action ---
    async function handleCapture() {
        if (!models) return showToast('النماذج غير جاهزة', 'error');
        
        $('captureBtn').disabled = true;
        setStatus('جاري المعالجة...', true);

        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
        
        if (!detection) {
            showToast('لم يتم اكتشاف وجه، حاول مرة أخرى', 'error');
            $('captureBtn').disabled = false;
            setStatus('النظام جاهز ✔');
            return;
        }

        // Capture Image
        const c = document.createElement('canvas');
        c.width = video.videoWidth; c.height = video.videoHeight;
        c.getContext('2d').drawImage(video, 0, 0);
        const imgData = c.toDataURL('image/jpeg');

        if (regMode) {
            const payload = {
                action: 'register',
                name: regData.name,
                email: regData.email,
                descriptor: Array.from(detection.descriptor),
                imageData: imgData
            };
            
            try {
                const response = await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json(); // Parse response to check for errors
                
                if(result.success) {
                    const newEmp = { name: regData.name, code: result.code || 'EMP_NEW', imageData: imgData };
                    localData.push(newEmp);
                    localStorage.setItem('axentro_data', JSON.stringify(localData));
                    
                    showToast('تم التسجيل بنجاح! راجع بريدك الإلكتروني للحصول على كود الدخول وكلمة السر.', 'success');
                    closeCamera();
                    showLoginScreen();
                } else {
                    showToast(result.error || 'حدث خطأ أثناء التسجيل', 'error');
                }
            } catch (e) {
                showToast('خطأ في الاتصال بالخادم', 'error');
            }
        }
        
        $('captureBtn').disabled = false;
        setStatus('النظام جاهز ✔');
    }

    // --- Attendance ---
    async function handleAttendance(type) {
        let target = selectedEmp;
        
        if (user.isAdmin) {
            const searchVal = $('searchInput').value.trim();
            target = employees.find(e => e.name === searchVal || e.code === searchVal);
            if (!target) return showToast('يرجى اختيار موظف صحيح من البحث', 'error');
        } else {
            target = user;
        }

        const localEmp = localData.find(e => e.code === target.code || e.name === target.name);
        if (!localEmp || !localEmp.imageData) return showToast('لا توجد صورة مسجلة لهذا الموظف محلياً، يرجى إعادة التسجيل.', 'error');

        const now = new Date();
        const timeStr = now.toLocaleString('ar-EG', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateStr = now.toLocaleDateString('ar-EG');
        
        const payload = {
            action: 'attendance',
            name: target.name,
            code: target.code,
            type: type,
            location: currentLoc || 'غير متوفر',
            datetime: `${dateStr} - ${timeStr}`,
            imageData: localEmp.imageData
        };

        setStatus('جاري الإرسال...', true);
        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
            showToast(`تم تسجيل ${type} بنجاح`, 'success');
        } catch (e) {
            showToast('فشل الإرسال', 'error');
        }
        setStatus('النظام جاهز ✔');
    }

    // --- Search (Admin) ---
    $('searchInput')?.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const res = employees.filter(emp => emp.name.toLowerCase().includes(q) || emp.code.toLowerCase().includes(q));
        const html = res.map(e => `<div onclick="selectEmp('${e.name}')" style="padding:8px; cursor:pointer; border-bottom:1px solid #334155;">${e.name} (${e.code})</div>`).join('');
        $('searchResults').innerHTML = html;
    });
    
    function selectEmp(name) {
        $('searchInput').value = name;
        $('searchResults').innerHTML = '';
        selectedEmp = employees.find(e => e.name === name);
    }

    // --- Location ---
    let currentLoc = null;
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                currentLoc = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                $('locBar').innerHTML = `<i class="fas fa-map-marker-alt"></i> <a href="${currentLoc}" target="_blank" style="color:#38bdf8">الموقع محدد</a>`;
            }, () => {
                $('locBar').innerHTML = `<i class="fas fa-exclamation-triangle"></i> تعذر الحصول على الموقع`;
                currentLoc = 'غير متوفر';
            });
        }
    }

    // Start
    init();
</script>
</body>
</html>
