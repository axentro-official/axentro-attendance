<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axentro | الحضور بالوجه</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="particles-bg"></div>
    <div class="container">
        <header class="main-header">
            <h1 class="glow-text">نظام الحضور والانصراف</h1>
            <p class="subtitle">Axentro Attendance System</p>
        </header>

        <div class="camera-card">
            <div class="camera-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay" style="display: none;"></canvas>
                <div class="camera-overlay"></div>
                <div class="face-indicator" id="faceIndicator">
                    <div class="pulse-ring"></div>
                    <div class="face-icon">😀</div>
                </div>
            </div>
            <div class="status-card" id="status">
                <div class="spinner"></div>
                <span>جاري تحميل النماذج...</span>
            </div>
            <div class="location-card" id="location">
                <span>📍 جاري الحصول على الموقع...</span>
            </div>
        </div>

        <div class="admin-card">
            <h3>📝 تسجيل موظف جديد</h3>
            <div class="input-group">
                <input type="text" id="empName" placeholder="اسم الموظف" autocomplete="off">
                <button id="registerBtn" class="btn-register">
                    <span>📸</span> التقاط الوجه وتسجيل
                </button>
            </div>
            <div class="register-hint">أدخل الاسم ثم اضغط الزر، وتأكد من وضوح الوجه أمام الكاميرا</div>
        </div>

        <div class="action-card">
            <button id="attendanceBtn" class="btn-attendance">
                <span>✅</span> تسجيل حضور
            </button>
            <button id="leaveBtn" class="btn-leave">
                <span>🚪</span> تسجيل انصراف
            </button>
        </div>

        <div class="recognized-name" id="recognizedName" style="display: none;">
            <div class="name-badge">
                <span>مرحباً</span>
                <strong id="recognizedUserName">---</strong>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>© 2024 Axentro - All Rights Reserved</p>
            <p>Powered by Axentro System</p>
            <div class="qr-container">
                <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank" rel="noopener">
                    <img src="qr-links.png" alt="QR Code" class="qr-image" loading="lazy">
                </a>
                <span>Scan Me</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
