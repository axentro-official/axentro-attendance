<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axentro | الحضور بالوجه</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        /* نفس الـ CSS السابق (لم يتغير) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0f172a 100%);
            color: #f1f5f9;
            text-align: center;
            direction: rtl;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        .container { max-width: 550px; margin: auto; position: relative; z-index: 1; }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ffffff, #a5f3fc, #38bdf8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            animation: fadeInDown 0.6s ease;
        }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; animation: fadeInUp 0.6s ease; }

        /* كاميرا */
        .camera-container {
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            position: relative;
            aspect-ratio: 4/3;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
            transform: scale(0.98);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .camera-container.active { display: block; transform: scale(1); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 60px;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .capture-btn:active { transform: translateX(-50%) scale(0.96); }

        /* كروت */
        .status-card, .location-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 12px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .admin-card, .action-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(59,130,246,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .admin-card:hover, .action-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.3);
        }
        .input-group { display: flex; flex-direction: column; gap: 16px; }
        input {
            background: rgba(0,0,0,0.5);
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            color: white;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active { transform: scale(0.97); }
        .btn-register {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            width: 100%;
            box-shadow: 0 8px 16px -6px rgba(245,158,11,0.3);
        }
        .btn-attendance {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            flex: 1;
            box-shadow: 0 8px 16px -6px rgba(16,185,129,0.3);
        }
        .btn-leave {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            flex: 1;
            box-shadow: 0 8px 16px -6px rgba(239,68,68,0.3);
        }
        .action-card { display: flex; gap: 16px; }
        .register-hint { font-size: 12px; color: #94a3b8; margin-top: 12px; }
        footer {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 24px 16px;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px 32px 0 0;
        }
        .qr-image {
            width: 70px;
            height: auto;
            border-radius: 16px;
            background: white;
            padding: 6px;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .qr-image:hover { transform: scale(1.05); }

        /* Toast */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            max-width: 85%;
            text-align: center;
            direction: rtl;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        .toast-message.show { transform: translateX(-50%) translateY(0); }
        .toast-message.success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-message.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-message.info { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        /* Modal تأكيد */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 48px;
            padding: 32px 24px;
            max-width: 320px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(59,130,246,0.4);
            box-shadow: 0 25px 40px -12px black;
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .modal.active .modal-content { transform: scale(1); }
        .modal-content h3 {
            font-size: 26px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a5f3fc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .modal-content p { color: #cbd5e1; margin-bottom: 24px; }
        .modal-btn { background: #3b82f6; padding: 12px 24px; border-radius: 40px; font-weight: bold; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <h1>نظام الحضور والانصراف</h1>
    <p class="subtitle">Axentro Attendance System</p>

    <div class="camera-container" id="cameraContainer">
        <video id="video" autoplay muted playsinline></video>
        <button class="capture-btn" id="captureBtn">📸 التقاط الوجه</button>
    </div>

    <div class="status-card" id="status">
        <div class="spinner"></div>
        <span>جاري تحميل النماذج...</span>
    </div>
    <div class="location-card" id="location">
        <span>📍 جاري الحصول على الموقع...</span>
    </div>

    <div class="admin-card">
        <h3>📝 تسجيل موظف جديد</h3>
        <div class="input-group">
            <input type="text" id="empName" placeholder="اسم الموظف" autocomplete="off">
            <button id="registerBtn" class="btn-register">📸 التقاط الوجه وتسجيل</button>
        </div>
        <div class="register-hint">أدخل الاسم ثم اضغط الزر، سيتم فتح الكاميرا لالتقاط وجهك وحفظه مع كود تلقائي.</div>
    </div>

    <div class="action-card">
        <button id="attendanceBtn" class="btn-attendance">✅ تسجيل حضور</button>
        <button id="leaveBtn" class="btn-leave">🚪 تسجيل انصراف</button>
    </div>
</div>

<footer>
    <p>© 2025 Axentro - All Rights Reserved</p>
    <p>Powered by Axentro System</p>
    <a href="https://axentro-official.github.io/axentro-website/links.html" target="_blank">
        <img src="qr-links.png" alt="QR Code" class="qr-image">
    </a>
    <p>Scan Me</p>
</footer>

<script>
    // ---------- العناصر ----------
    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    const locationDiv = document.getElementById('location');
    const empNameInput = document.getElementById('empName');
    const registerBtn = document.getElementById('registerBtn');
    const attendanceBtn = document.getElementById('attendanceBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const cameraContainer = document.getElementById('cameraContainer');
    const captureBtn = document.getElementById('captureBtn');

    // ---------- المتغيرات ----------
    let modelsLoaded = false;
    let stream = null;
    let labeledDescriptors = [];
    let currentLocation = null;
    let currentAction = null;      // 'register'
    let tempName = null;
    let employeesList = [];         // [{name, code}]

    // تأكد من استخدام الرابط الصحيح بعد النشر
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxnJeFvBSZuH7E_NN3-8Mv5K694rCv_jrGTbT_sl5Tl0UnRmzuKZx8przHd1IuvgiQBMA/exec';

    // ---------- دوال مساعدة ----------
    function showToast(message, type = 'info') {
        let toast = document.getElementById('customToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.add('show', type);
        setTimeout(() => toast.classList.remove('show', type), 4000);
    }

    function updateStatus(text, isLoading = false) {
        statusDiv.innerHTML = isLoading ? `<div class="spinner"></div><span>${text}</span>` : `<span>${text}</span>`;
    }

    function showConfirmationModal(title, message, onClose) {
        let modal = document.getElementById('confirmationModal');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'confirmationModal';
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3></h3>
                    <p></p>
                    <button class="modal-btn">رجوع</button>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('.modal-btn').onclick = () => {
                modal.classList.remove('active');
                if (onClose) onClose();
            };
        }
        modal.querySelector('h3').textContent = title;
        modal.querySelector('p').textContent = message;
        modal.classList.add('active');
    }

    // ---------- تحميل النماذج ----------
    async function loadModels() {
        updateStatus('جاري تحميل نماذج الوجه...', true);
        try {
            const modelUrl = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl);
            await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
            await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
            modelsLoaded = true;
            updateStatus('النماذج جاهزة ✅', false);
            showToast('تم تحميل نماذج الوجه بنجاح', 'success');
        } catch (err) {
            updateStatus('فشل تحميل النماذج: ' + err.message, false);
            showToast('فشل تحميل النماذج، تأكد من الاتصال بالإنترنت', 'error');
        }
    }

    // ---------- جلب قائمة الموظفين من الشيت (GET - عادي) ----------
    async function fetchEmployeesFromSheet() {
        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getEmployees`);
            if (!response.ok) throw new Error('فشل الاتصال بالخادم');
            const data = await response.json();
            if (data.success && data.employees) {
                employeesList = data.employees;
                updateStatus(`تم تحميل ${employeesList.length} موظف من السجل`, false);
            } else {
                employeesList = [];
                updateStatus('لا يوجد موظفون مسجلون بعد', false);
            }
        } catch (err) {
            console.error(err);
            employeesList = [];
            updateStatus('فشل تحميل قائمة الموظفين - حاول مرة أخرى', false);
            showToast('تعذر الاتصال بالخادم لجلب الموظفين', 'error');
        }
    }

    // ---------- تسجيل موظف جديد (POST - مع no-cors) ----------
    async function registerNewEmployee(name, descriptor, imageData) {
        updateStatus('جاري تسجيل الموظف...', true);
        try {
            const payload = {
                action: 'register',
                name: name,
                descriptor: Array.from(descriptor),
                imageData: imageData
            };
            // استخدام no-cors لتجنب CORS، ولن نقرأ الاستجابة
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            // بما أننا لا نستطيع قراءة الاستجابة، نفترض النجاح ونضيف الموظف محلياً
            // إنشاء كود مؤقت (سيتم إنشاء الكود الحقيقي في الخادم، لكننا لا نعرفه هنا)
            // نضيف الموظف للقائمة المحلية برقم كود مؤقت
            const tempCode = `EMP${(employeesList.length + 1).toString().padStart(3, '0')}`;
            employeesList.push({ name, code: tempCode });
            // حفظ descriptor محلياً (اختياري)
            const existing = labeledDescriptors.find(ld => ld.label === name);
            if (existing) {
                existing.descriptors.push(descriptor);
            } else {
                labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(name, [descriptor]));
            }
            saveEmployeesLocal();
            showToast(`✅ تم إرسال طلب تسجيل ${name} بنجاح. سيظهر في النظام خلال لحظات.`, 'success');
            return true;
        } catch (err) {
            console.error(err);
            showToast('فشل إرسال طلب التسجيل. تأكد من الاتصال بالإنترنت.', 'error');
            return false;
        } finally {
            updateStatus('جاهز', false);
        }
    }

    // ---------- حفظ/تحميل الـ descriptors محلياً ----------
    function saveEmployeesLocal() {
        const data = labeledDescriptors.map(ld => ({
            label: ld.label,
            descriptors: ld.descriptors.map(d => Array.from(d))
        }));
        localStorage.setItem('axentro_face_descriptors', JSON.stringify(data));
    }

    function loadEmployeesLocal() {
        const stored = localStorage.getItem('axentro_face_descriptors');
        if (stored) {
            const data = JSON.parse(stored);
            labeledDescriptors = data.map(item => new faceapi.LabeledFaceDescriptors(
                item.label,
                item.descriptors.map(d => new Float32Array(d))
            ));
        }
    }

    // ---------- الكاميرا ----------
    async function openCamera() {
        if (stream) closeCamera();
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            cameraContainer.classList.add('active');
            return true;
        } catch (err) {
            showToast('تعذر الوصول إلى الكاميرا', 'error');
            return false;
        }
    }

    function closeCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        video.srcObject = null;
        cameraContainer.classList.remove('active');
    }

    // ---------- التقاط الوجه للتسجيل ----------
    async function captureAndRegister() {
        if (!modelsLoaded) {
            showToast('النماذج لم تُحمل بعد، انتظر قليلاً', 'warning');
            return false;
        }
        if (!video.srcObject) {
            showToast('الكاميرا غير جاهزة', 'error');
            return false;
        }

        updateStatus('جاري معالجة الوجه...', true);
        try {
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            if (!detection) {
                updateStatus('لم يتم اكتشاف وجه', false);
                showToast('لم يتم اكتشاف وجه، حاول مرة أخرى', 'error');
                return false;
            }

            const descriptor = detection.descriptor;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');

            if (currentAction === 'register' && tempName) {
                const success = await registerNewEmployee(tempName, descriptor, imageData);
                if (success) {
                    showConfirmationModal('✅ تم التسجيل', `تم إرسال طلب تسجيل الموظف ${tempName} بنجاح.`, () => {});
                }
                return success;
            }
            return false;
        } catch (err) {
            console.error(err);
            showToast('حدث خطأ أثناء معالجة الوجه', 'error');
            return false;
        } finally {
            updateStatus('جاهز', false);
            closeCamera();
            currentAction = null;
            tempName = null;
        }
    }

    // ---------- حضور/انصراف (POST - مع no-cors) ----------
    async function sendAttendanceManual(name, type) {
        if (!currentLocation) {
            showToast('جاري الحصول على الموقع... حاول مرة أخرى', 'info');
            setTimeout(() => sendAttendanceManual(name, type), 1000);
            return;
        }

        const employee = employeesList.find(emp => emp.name === name);
        if (!employee) {
            showToast('الموظف غير مسجل في النظام. يرجى التسجيل أولاً.', 'error');
            return;
        }

        const opened = await openCamera();
        if (!opened) return;

        // انتظر لحظة لظهور الكاميرا ثم التقط الصورة
        setTimeout(async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg');
            closeCamera();

            const now = new Date();
            const timeStr = now.toLocaleString('ar-EG', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateStr = now.toLocaleDateString('ar-EG');
            const fullDateTime = `${dateStr} - ${timeStr}`;

            const payload = {
                action: 'attendance',
                name: name,
                code: employee.code,
                type: type,
                location: currentLocation,
                datetime: fullDateTime,
                imageData: imageData
            };

            updateStatus('جاري الإرسال...', true);
            try {
                // استخدام no-cors لتجنب CORS
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                updateStatus(`تم إرسال طلب ${type}`, false);
                showConfirmationModal(`✅ تم تسجيل ${type}`, `الموظف: ${name}\nالكود: ${employee.code}\nالوقت: ${fullDateTime}`, () => {});
            } catch (err) {
                updateStatus('خطأ في الإرسال', false);
                showToast('حدث خطأ في الاتصال بالخادم. تأكد من الإنترنت.', 'error');
                console.error(err);
            } finally {
                updateStatus('جاهز', false);
            }
        }, 500);
    }

    // ---------- معالجة الأزرار ----------
    async function handleRegister() {
        const name = empNameInput.value.trim();
        if (!name) {
            showToast('يرجى إدخال اسم الموظف', 'warning');
            return;
        }
        if (employeesList.some(emp => emp.name === name)) {
            showToast('هذا الاسم مسجل مسبقاً', 'warning');
            return;
        }
        tempName = name;
        currentAction = 'register';
        const opened = await openCamera();
        if (opened) {
            captureBtn.onclick = async () => {
                captureBtn.disabled = true;
                await captureAndRegister();
                captureBtn.disabled = false;
            };
        }
    }

    function handleAttendance(type) {
        const name = empNameInput.value.trim();
        if (!name) {
            showToast('يرجى إدخال اسم الموظف أولاً', 'warning');
            return;
        }
        sendAttendanceManual(name, type);
    }

    // ---------- الموقع ----------
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    currentLocation = `https://maps.google.com/?q=${lat},${lng}`;
                    locationDiv.innerHTML = `<span>📍 <a href="${currentLocation}" target="_blank" style="color:#60a5fa;">الموقع الحالي</a></span>`;
                },
                err => {
                    locationDiv.innerHTML = `<span>⚠️ فشل الحصول على الموقع: ${err.message}</span>`;
                    currentLocation = 'غير متوفر';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            locationDiv.innerHTML = `<span>⚠️ المتصفح لا يدعم تحديد الموقع</span>`;
            currentLocation = 'غير مدعوم';
        }
    }

    // ---------- ربط الأزرار ----------
    registerBtn.onclick = handleRegister;
    attendanceBtn.onclick = () => handleAttendance('حضور');
    leaveBtn.onclick = () => handleAttendance('انصراف');

    // ---------- بدء التشغيل ----------
    async function init() {
        await loadModels();
        loadEmployeesLocal();
        await fetchEmployeesFromSheet();
        getLocation();
        setInterval(getLocation, 30000);
    }
    init();
</script>
</body>
</html>
